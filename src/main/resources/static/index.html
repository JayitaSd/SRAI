<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRAI · RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
</head>
<body>

<header class="app-header">
    <div class="logo">
      <span class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
        <span class="logo-text">SRAI</span>
    </div>
    <div class="header-tag">RAG · SPRING AI</div>
</header>

<main class="app-layout">

    <!-- LEFT: Upload Panel -->
    <section class="panel upload-panel" id="uploadPanel">

        <div class="panel-header">
            <h2 class="panel-title">Document</h2>
            <p class="panel-subtitle">Upload a document to start a conversation</p>
        </div>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.doc,.png,.jpg,.jpeg" hidden />
            <div class="upload-inner" id="uploadInner">
                <div class="upload-icon-wrap">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-main-text">Drag & drop your file here</p>
                <p class="upload-sub-text">or <button class="browse-btn" id="browseBtn">browse</button></p>
                <p class="upload-formats">.txt · .pdf · .doc · .docx · .png · .jpg · .jpeg</p>
            </div>
        </div>

        <!-- File preview (hidden until file selected) -->
        <div class="file-preview" id="filePreview">
            <div class="file-info">
                <div class="file-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <div class="file-meta">
                    <span class="file-name" id="fileName">—</span>
                    <span class="file-size" id="fileSize">—</span>
                </div>
            </div>
            <button class="remove-btn" id="removeBtn" title="Remove file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <button class="process-btn" id="processBtn" disabled>
        <span class="process-btn-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </span>
            <span id="processBtnText">Process Document</span>
        </button>

        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">No document loaded</span>
        </div>

    </section>

    <!-- DIVIDER (desktop only) -->
    <div class="panel-divider"></div>

    <!-- RIGHT: Chat Panel -->
    <section class="panel chat-panel" id="chatPanel">

        <div class="panel-header">
            <h2 class="panel-title">Chat</h2>
            <button class="clear-chat-btn" id="clearChatBtn" title="Clear chat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
            </button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty" id="chatEmpty">
                <div class="chat-empty-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <p>Process a document to start asking questions</p>
            </div>
        </div>

        <div class="chat-input-area" id="chatInputArea">
            <div class="chat-input-wrap">
          <textarea
                  id="chatInput"
                  class="chat-input"
                  placeholder="Ask something about your document..."
                  rows="1"
                  disabled
          ></textarea>
                <button class="send-btn" id="sendBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="chat-hint">Answers are grounded in your document only</p>
        </div>

    </section>

</main>

<script src="index.js"></script>
</body>
</html>
